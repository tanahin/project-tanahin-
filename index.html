<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanahin</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
      Pi.init({ version: "2.0", sandbox: false });
    </script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; background: #fff; }
        h1 { margin-bottom: 8px; }
        p { color: #666; margin-top: 0; }
        .result-box { background: #f8f9fa; border-radius: 12px; padding: 20px; margin: 20px 0; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
        .result-item:last-child { margin-bottom: 0; padding-top: 12px; border-top: 2px solid #ddd; font-weight: bold; font-size: 18px; color: #764ba2; }
        .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>🏡 Tanahin</h1>
    <p>Hasil Pengukuran Tanah + RAB Otomatis</p>

    <div class="result-box">
        <div class="result-item">
            <span>Luas Tanah:</span>

        </div>
